<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top 3 ร้านอาหาร — Team Lunch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:  #FDF6E3;
      --paper:  #F5EDD5;
      --ink:    #1C1A14;
      --rust:   #B5451B;
      --gold:   #C8991A;
      --silver: #7A8B96;
      --bronze: #8B5E3C;
      --green:  #2A5F4A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--cream);
      background-image: radial-gradient(circle, #c8b89845 1px, transparent 1px);
      background-size: 24px 24px;
      color: var(--ink);
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      padding: 3rem 1.5rem 5rem;
    }

    /* ── HEADER ── */
    .page-header {
      text-align: center;
      max-width: 720px;
      margin: 0 auto 3.5rem;
    }

    .header-rule {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .header-rule::before,
    .header-rule::after {
      content: "";
      flex: 1;
      height: 2px;
      background: var(--ink);
    }

    .header-stamp {
      font-family: 'Playfair Display', serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--rust);
      border: 2px solid var(--rust);
      padding: 0.3rem 1.1rem;
      white-space: nowrap;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
    }

    .page-subtitle {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--rust);
    }

    .page-meta {
      margin-top: 0.75rem;
      font-size: 0.72rem;
      color: #aaa;
      letter-spacing: 0.06em;
    }

    .header-deco {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 1.5rem;
      opacity: 0.25;
    }
    .header-deco::before,
    .header-deco::after {
      content: "";
      width: 80px;
      border-top: 1px dashed var(--ink);
    }
    .header-deco-dot {
      width: 6px;
      height: 6px;
      background: var(--ink);
      transform: rotate(45deg);
    }

    /* ── CARDS ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2.25rem;
      max-width: 1080px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border: 2px solid var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 9px 9px 0 var(--ink);
    }

    .card-rank-bar { height: 5px; }
    .rank-1 .card-rank-bar { background: var(--gold); }
    .rank-2 .card-rank-bar { background: var(--silver); }
    .rank-3 .card-rank-bar { background: var(--bronze); }

    .card-body { padding: 1.5rem; }

    .rank-badge {
      display: inline-block;
      font-family: 'Playfair Display', serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1.5px solid var(--ink);
      padding: 0.2rem 0.65rem;
      margin-bottom: 0.75rem;
    }
    .rank-1 .rank-badge { background: var(--gold); }
    .rank-2 .rank-badge { background: var(--silver); color: #fff; border-color: var(--silver); }
    .rank-3 .rank-badge { background: var(--bronze); color: #fff; border-color: var(--bronze); }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.4rem;
      line-height: 1.2;
      margin-bottom: 0.65rem;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }
    .tag {
      background: var(--paper);
      border: 1px solid #d0c4a8;
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      color: #665c44;
    }

    .score-block {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.75rem 0;
      border-top: 1.5px dashed rgba(28,26,20,0.2);
      border-bottom: 1.5px dashed rgba(28,26,20,0.2);
      margin-bottom: 1rem;
    }

    .score-num {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 3.2rem;
      line-height: 1;
    }
    .rank-1 .score-num { color: var(--gold); }
    .rank-2 .score-num { color: var(--silver); }
    .rank-3 .score-num { color: var(--bronze); }

    .score-right { line-height: 1.5; }
    .stars { font-size: 0.85rem; letter-spacing: 0.05em; color: var(--gold); }
    .review-count { font-size: 0.72rem; color: #999; font-weight: 500; }

    .info-list { margin-bottom: 0.75rem; }
    .info-row {
      display: flex;
      gap: 0.5rem;
      font-size: 0.78rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid rgba(28,26,20,0.07);
      align-items: flex-start;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label {
      min-width: 5.5rem;
      font-weight: 600;
      color: #999;
      flex-shrink: 0;
      font-size: 0.73rem;
    }
    .info-value { color: var(--ink); line-height: 1.45; }

    .group-badge {
      display: inline-block;
      background: var(--green);
      color: #fff;
      border: 1.5px solid var(--ink);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      margin-bottom: 0.75rem;
    }

    .card-link {
      display: block;
      text-align: center;
      background: var(--ink);
      color: var(--cream);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.7rem 1rem;
      margin-top: 0.75rem;
      transition: background 0.1s;
    }
    .card-link:hover { background: var(--rust); }

    /* ── LOADING ── */
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--silver);
    }
    .loading-spinner {
      display: inline-block;
      width: 2rem;
      height: 2rem;
      border: 3px solid var(--paper);
      border-top-color: var(--rust);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'Playfair Display', serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* ── EMPTY / ERROR ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: #bbb;
      border: 2px dashed #ddd;
      font-size: 1rem;
    }

    /* ── FOOTER ── */
    .page-footer {
      text-align: center;
      margin-top: 4rem;
      font-size: 0.7rem;
      color: #ccc;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      .cards-grid { gap: 3rem; }
      .score-num { font-size: 2.5rem; }
      .card { box-shadow: 4px 4px 0 var(--ink); }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="header-rule">
      <span class="header-stamp">Team Lunch &nbsp;·&nbsp; 8–12 คน</span>
    </div>
    <h1 class="page-title">Top 3 ร้านอาหาร</h1>
    <p class="page-subtitle">เรียงตามคะแนน &amp; จำนวนรีวิว</p>
    <p class="page-meta">ข้อมูลจาก Google Sheets &nbsp;·&nbsp; <span id="today"></span></p>
    <div class="header-deco">
      <div class="header-deco-dot"></div>
    </div>
  </header>

  <main>
    <div class="cards-grid" id="cards">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">กำลังโหลดข้อมูล…</div>
      </div>
    </div>
  </main>

  <footer class="page-footer">
    <p>Resteraunt &nbsp;·&nbsp; Restaurant Picker for Teams</p>
  </footer>

  <script>
    document.getElementById('today').textContent = new Date().toLocaleDateString('th-TH', {
      timeZone: 'Asia/Bangkok', year: 'numeric', month: 'long', day: 'numeric'
    });

    function esc(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const LABELS = ['🥇 อันดับ 1', '🥈 อันดับ 2', '🥉 อันดับ 3'];

    function renderCard(r, rank) {
      const score = Number(r['คะแนนรีวิว']) || 0;
      const filled = Math.min(5, Math.round(score));
      const stars = '★'.repeat(filled) + '☆'.repeat(5 - filled);
      const reviews = Number(r['จำนวนรีวิว'])
        ? Number(r['จำนวนรีวิว']).toLocaleString('th-TH')
        : '—';

      const infoRows = [
        [r['ที่ตั้ง'],             '📍 ที่ตั้ง'],
        [r['เวลาเปิดปิด'],         '🕐 เวลาเปิด'],
        [r['หมายเหตุการเดินทาง'], '🚗 การเดินทาง'],
        [r['หมายเหตุเพิ่มเติม'],  '📝 หมายเหตุ'],
      ]
        .filter(([val]) => val?.trim())
        .map(([val, label]) =>
          `<div class="info-row"><span class="info-label">${label}</span><span class="info-value">${esc(val)}</span></div>`
        ).join('');

      const tags = [r['พื้นที่'], r['ประเภทอาหาร'], r['ช่วงราคา']]
        .filter(Boolean)
        .map(t => `<span class="tag">${esc(t)}</span>`)
        .join('');

      const groupBadge = r['เหมาะกับกลุ่มหรือไม่']?.trim()
        ? `<div class="group-badge">✓ เหมาะสำหรับกลุ่ม 8–12 คน</div>`
        : '';

      const mapLink = r['ลิงก์แหล่งข้อมูล']
        ? `<a class="card-link" href="${esc(r['ลิงก์แหล่งข้อมูล'])}" target="_blank" rel="noopener noreferrer">ดูบน Google Maps →</a>`
        : '';

      return `
<div class="card rank-${rank}">
  <div class="card-rank-bar"></div>
  <div class="card-body">
    <div class="rank-badge">${LABELS[rank - 1]}</div>
    <h2 class="card-name">${esc(r['ชื่อร้าน'])}</h2>
    <div class="card-tags">${tags}</div>
    <div class="score-block">
      <span class="score-num">${score || '—'}</span>
      <div class="score-right">
        <div class="stars">${stars}</div>
        <div class="review-count">${reviews} รีวิว</div>
      </div>
    </div>
    <div class="info-list">${infoRows}</div>
    ${groupBadge}
    ${mapLink}
  </div>
</div>`;
    }

    async function loadRestaurants() {
      const grid = document.getElementById('cards');
      try {
        const res = await fetch('/restaurants');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const { restaurants, error } = await res.json();
        if (error) throw new Error(error);
        if (!restaurants || restaurants.length === 0) {
          grid.innerHTML = '<div class="empty">ยังไม่มีข้อมูลร้านอาหาร — กรุณารัน scraper ก่อน</div>';
          return;
        }
        grid.innerHTML = restaurants.map((r, i) => renderCard(r, i + 1)).join('\n');
      } catch (err) {
        grid.innerHTML = `<div class="empty">โหลดข้อมูลไม่สำเร็จ: ${esc(err.message)}</div>`;
      }
    }

    loadRestaurants();
  </script>

</body>
</html>
